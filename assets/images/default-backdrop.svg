<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#1e293b"/>
  <rect width="1280" height="720" fill="url(#grad)"/>
  
  <!-- Abstract Film Reel Pattern -->
  <g opacity="0.1" fill="#ffffff">
    <circle cx="200" cy="100" r="50"/>
    <circle cx="200" cy="220" r="50"/>
    <circle cx="200" cy="340" r="50"/>
    <circle cx="200" cy="460" r="50"/>
    <circle cx="200" cy="580" r="50"/>
    
    <circle cx="1080" cy="100" r="50"/>
    <circle cx="1080" cy="220" r="50"/>
    <circle cx="1080" cy="340" r="50"/>
    <circle cx="1080" cy="460" r="50"/>
    <circle cx="1080" cy="580" r="50"/>
    
    <rect x="150" y="100" width="980" height="20" rx="10"/>
    <rect x="150" y="220" width="980" height="20" rx="10"/>
    <rect x="150" y="340" width="980" height="20" rx="10"/>
    <rect x="150" y="460" width="980" height="20" rx="10"/>
    <rect x="150" y="580" width="980" height="20" rx="10"/>
  </g>
  
  <!-- Logo Text -->
  <text x="640" y="360" font-family="Arial, sans-serif" font-size="60" font-weight="bold" text-anchor="middle" fill="#ffffff">LỌC PHIM</text>
  <text x="640" y="420" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#ffffff">Xem phim lẻ, phim bộ và anime mới nhất</text>
</svg>