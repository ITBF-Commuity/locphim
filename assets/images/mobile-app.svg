<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="600" viewBox="0 0 300 600">
  <!-- Phone Frame -->
  <rect x="30" y="20" width="240" height="480" rx="20" fill="#242526" stroke="#333" stroke-width="2"/>
  <rect x="35" y="25" width="230" height="470" rx="18" fill="#121212"/>
  
  <!-- Screen Content -->
  <rect x="40" y="55" width="220" height="410" rx="2" fill="#1e1e1e"/>
  
  <!-- Status Bar -->
  <rect x="40" y="30" width="220" height="25" rx="2" fill="#121212"/>
  <circle cx="60" cy="42" r="3" fill="#666"/>
  <circle cx="70" cy="42" r="3" fill="#666"/>
  <circle cx="80" cy="42" r="3" fill="#666"/>
  <rect x="210" y="39" width="15" height="6" rx="2" fill="#666"/>
  <circle cx="235" cy="42" r="3" fill="#666"/>
  
  <!-- Navigation Bar -->
  <rect x="40" y="465" width="220" height="30" rx="2" fill="#121212"/>
  <circle cx="110" cy="480" r="8" stroke="#666" stroke-width="2" fill="none"/>
  <rect x="140" y="475" width="20" height="10" rx="2" fill="#666"/>
  <path d="M180,475 L190,485 M180,485 L190,475" stroke="#666" stroke-width="2"/>
  
  <!-- App Interface -->
  <!-- Header -->
  <rect x="40" y="55" width="220" height="50" fill="#d9230f"/>
  <rect x="60" y="67" width="120" height="25" rx="4" fill="#ffffff" opacity="0.2"/>
  <circle cx="225" cy="80" r="12" fill="#ffffff" opacity="0.2"/>
  
  <!-- Content -->
  <!-- Movie 1 -->
  <rect x="50" y="115" width="95" height="140" rx="4" fill="#333"/>
  <rect x="60" y="225" width="75" height="10" rx="2" fill="#666"/>
  <rect x="60" y="240" width="55" height="5" rx="2" fill="#555"/>
  
  <!-- Movie 2 -->
  <rect x="155" y="115" width="95" height="140" rx="4" fill="#333"/>
  <rect x="165" y="225" width="75" height="10" rx="2" fill="#666"/>
  <rect x="165" y="240" width="55" height="5" rx="2" fill="#555"/>
  
  <!-- Movie 3 -->
  <rect x="50" y="265" width="95" height="140" rx="4" fill="#333"/>
  <rect x="60" y="375" width="75" height="10" rx="2" fill="#666"/>
  <rect x="60" y="390" width="55" height="5" rx="2" fill="#555"/>
  
  <!-- Movie 4 -->
  <rect x="155" y="265" width="95" height="140" rx="4" fill="#333"/>
  <rect x="165" y="375" width="75" height="10" rx="2" fill="#666"/>
  <rect x="165" y="390" width="55" height="5" rx="2" fill="#555"/>
  
  <!-- Play Button on Movie 1 -->
  <circle cx="97" cy="185" r="20" fill="#d9230f" opacity="0.9"/>
  <path d="M92,175 L92,195 L107,185 Z" fill="white"/>
  
  <!-- Bottom Reflection -->
  <ellipse cx="150" cy="520" rx="100" ry="10" fill="#333" opacity="0.3"/>
  
  <!-- Phone Buttons -->
  <rect x="20" y="150" width="5" height="40" rx="2" fill="#333"/>
  <rect x="20" y="200" width="5" height="40" rx="2" fill="#333"/>
  <rect x="275" y="150" width="5" height="60" rx="2" fill="#333"/>
  
  <!-- App Logo in Phone -->
  <rect x="45" y="67" width="10" height="25" rx="2" fill="#ffffff"/>
  <text x="150" y="85" font-family="Arial" font-size="18" fill="white" text-anchor="middle" dominant-baseline="middle">Lọc Phim</text>
</svg>