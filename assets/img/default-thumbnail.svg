<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="300" viewBox="0 0 200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="300" fill="#1E1E1E"/>
  
  <!-- Gradient Overlay -->
  <rect width="200" height="300" fill="url(#gradient)"/>
  
  <!-- Film Reel Icon -->
  <g transform="translate(80, 110) scale(0.8)">
    <circle cx="30" cy="30" r="40" fill="#333333"/>
    <circle cx="30" cy="30" r="35" fill="#1E1E1E"/>
    
    <!-- Film Holes -->
    <circle cx="30" cy="-10" r="6" fill="#333333"/>
    <circle cx="58" cy="11" r="6" fill="#333333"/>
    <circle cx="48" cy="46" r="6" fill="#333333"/>
    <circle cx="7" cy="46" r="6" fill="#333333"/>
    <circle cx="-3" cy="11" r="6" fill="#333333"/>
    
    <!-- Play Icon -->
    <path d="M42 30L22 42V18L42 30Z" fill="#E50914"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="190" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">No Image</text>
  <text x="100" y="215" font-family="Arial, sans-serif" font-size="12" fill="#AAAAAA" text-anchor="middle">Lọc Phim</text>
  
  <!-- Decorative Elements -->
  <rect x="50" y="240" width="100" height="2" rx="1" fill="#333333"/>
  <rect x="65" y="250" width="70" height="2" rx="1" fill="#333333"/>
  <rect x="75" y="260" width="50" height="2" rx="1" fill="#333333"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2A2A2A"/>
      <stop offset="1" stop-color="#0E0E0E"/>
    </linearGradient>
  </defs>
</svg>